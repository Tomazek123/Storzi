<!DOCTYPE html>

<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storži - Outdoor skupnost</title>

<meta property="og:title" content="Storži - Outdoor skupnost">
<meta property="og:description" content="Razišči Slovenijo z nami. Pridruži se pohodniški skupini Storži.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tomazek123.github.io/Storzi/">
<meta property="og:image" content="https://tomazek123.github.io/Storzi/slika.jpg">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e5e7eb;
}

/* ANIMATED WATERMARK */
body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: url("logo.jpg.jpg") no-repeat center;
    background-size: 500px;
    opacity: 0.05;
    pointer-events: none;
    animation: floatLogo 30s ease-in-out infinite;
}

@keyframes floatLogo {
    0% { transform: translate(0,0) scale(1); opacity: 0.04; }
    25% { transform: translate(10px,-10px) scale(1.02); opacity: 0.05; }
    50% { transform: translate(-10px,10px) scale(1.03); opacity: 0.06; }
    75% { transform: translate(5px,-5px) scale(1.02); opacity: 0.05; }
    100% { transform: translate(0,0) scale(1); opacity: 0.04; }
}

/* NAVBAR */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(15,23,42,0.7);
    backdrop-filter: blur(10px);
    z-index: 10;
}

nav h1 { color: white; }

nav a {
    color: #e5e7eb;
    margin-left: 20px;
    text-decoration: none;
}

/* BUTTON */
button {
    background: #22c55e;
    border: none;
    padding: 10px 20px;
    border-radius: 999px;
    cursor: pointer;
}

/* HERO */
.hero {
    height: 100vh;
    background: linear-gradient(to bottom, rgba(0,0,0,0.6), rgba(15,23,42,1)), url('logo.jpg') center/cover;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
}

.hero h2 {
    font-size: 64px;
}

/* SECTION */
.section {
    padding: 100px 20px;
    max-width: 1200px;
    margin: auto;
}

.section h3 {
    text-align: center;
    margin-bottom: 40px;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 30px;
}

.card {
    height: 300px;
    border-radius: 20px;
    background-size: cover;
    background-position: center;
    position: relative;
    transition: transform 0.3s;
}

.card:hover { transform: scale(1.05); }

.card::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.card-content {
    position: absolute;
    bottom: 20px;
    left: 20px;
    z-index: 2;
}

.card a { color: white; text-decoration: none; }

/* FEATURES */
.features {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 30px;
}

.feature {
    background: #111827;
    padding: 30px;
    border-radius: 15px;
    text-align: center;
}

/* MODAL */
.modal {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: none;
    align-items: center;
    justify-content: center;
}

.modal-content {
    background: #111827;
    padding: 30px;
    border-radius: 15px;
    width: 300px;
}

.modal input {
    width: 100%;
    margin-bottom: 10px;
    padding: 10px;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    background: #020617;
}
</style>

</head>

<body>

<nav>
    <h1>🌲 Storži</h1>
    <div>
        <a href="#">Domov</a>
        <button onclick="openModal()">Dodaj izlet</button>
    </div>
</nav>

<section class="hero">
    <div>
        <h2>Razišči Slovenijo</h2>
    </div>
</section>

<section class="section" id="izleti">
    <h3>Zadnji izleti</h3>
    <div class="grid" id="posts"></div>
</section>

<section class="section">
    <h3>Zakaj Storži?</h3>
    <div class="features">
        <div class="feature">
            <h5>🏔 Avanture</h5>
            <p>Vsak izlet je nova zgodba.</p>
        </div>
        <div class="feature">
            <h5>👥 Skupnost</h5>
            <p>Poveži se z drugimi.</p>
        </div>
        <div class="feature">
            <h5>🌲 Narava</h5>
            <p>Odkrij Slovenijo.</p>
        </div>
    </div>
</section>

<footer>
    <p>© 2026 Storži</p>
</footer>

<!-- MODAL -->

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Nov izlet</h3>
        <input id="title" placeholder="Naslov">
        <input id="date" placeholder="Datum">
        <input id="image" placeholder="Slika">
        <input id="link" placeholder="Link">
        <button onclick="addPost()">Shrani</button>
    </div>
</div>

<script>
let posts = [];

fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const saved = JSON.parse(localStorage.getItem('posts')) || [];
    posts = [...data.posts, ...saved];
    render();
  });

function render() {
    const container = document.getElementById('posts');
    container.innerHTML = "";

    posts.forEach(post => {
        const el = document.createElement('div');
        el.className = 'card';
        el.style.backgroundImage = `url('${post.image}')`;

        el.innerHTML = `
            <div class="card-content">
                <h4><a href="${post.link}">${post.title}</a></h4>
                <p>${post.date}</p>
            </div>
        `;

        container.appendChild(el);
    });
}

function openModal() {
    document.getElementById('modal').style.display = 'flex';
}

function addPost() {
    const post = {
        title: document.getElementById('title').value,
        date: document.getElementById('date').value,
        image: document.getElementById('image').value,
        link: document.getElementById('link').value
    };

    posts.push(post);

    const saved = JSON.parse(localStorage.getItem('posts')) || [];
    saved.push(post);
    localStorage.setItem('posts', JSON.stringify(saved));

    document.getElementById('modal').style.display = 'none';
    render();
}
</script>

</body>
</html>
