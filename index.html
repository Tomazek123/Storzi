<!DOCTYPE html>

<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storži - Outdoor skupnost</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico">

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="bg" id="bg"></div>

<nav>
    <h1>🌲 Storži</h1>
    <ul class="nav-links">
        <li><a href="#next-adventures">Next Adventures</a></li>
        <li><a href="#izleti">Izleti</a></li>
        <li><button class="theme-toggle" id="theme-toggle">🌙</button></li>
    </ul>
</nav>

<section class="hero">
    <h2>Razišči Slovenijo</h2>
</section>

<section class="section">

<h2 id="next-adventures" style="margin-bottom:30px;">Next Adventures</h2>
<div class="grid" id="next-adventures-grid"></div>

</section>

<section class="section">

<div id="izleti" class="stats">
    <div>🏔 5 izletov</div>
    <div>🥾 Avanture</div>
    <div>📅 2026</div>
</div>

<div class="search">
    <input id="search" placeholder="Išči izlet...">
</div>

<div class="grid" id="posts"></div>

</section>


<script src="posts.js"></script>
<script>
// PARALLAX BG + WATERMARK
document.addEventListener('mousemove', e=>{
    const x=(e.clientX/window.innerWidth-0.5)*20;
    const y=(e.clientY/window.innerHeight-0.5)*20;
    bg.style.transform=`scale(1.1) translate(${x}px,${y}px)`;
});

// 📦 TVOJI IZLETI
let posts = [];

// WEATHER SYSTEM
const WX_TYPES = ['clear','wind','rain','snow','fog','storm'];
let wxRAF = null;
const wxCanvases = [];

function stopWx() {
    if (wxRAF) { cancelAnimationFrame(wxRAF); wxRAF = null; }
    wxCanvases.length = 0;
}

function initWx(card, type) {
    card.dataset.wx = type;

    if (type === 'clear') {
        const el = document.createElement('div');
        el.className = 'wx-sun';
        card.appendChild(el);

    } else if (type === 'wind') {
        const wrap = document.createElement('div');
        wrap.className = 'wx-wind';
        [16, 34, 52, 70].forEach((top, i) => {
            const s = document.createElement('span');
            s.style.cssText = `top:${top}%;width:${24+i*9}%;animation-duration:${2.1+i*.75}s;animation-delay:${-i*.85}s`;
            wrap.appendChild(s);
        });
        card.appendChild(wrap);

    } else if (type === 'fog') {
        const wrap = document.createElement('div');
        wrap.className = 'wx-fog';
        wrap.innerHTML = '<span></span><span></span>';
        card.appendChild(wrap);

    } else if (type === 'rain' || type === 'storm') {
        const canvas = document.createElement('canvas');
        canvas.className = 'wx-canvas';
        card.appendChild(canvas);
        const count = type === 'storm' ? 90 : 55;
        const particles = Array.from({length:count}, () => ({
            x: Math.random()*400, y: Math.random()*300,
            speed: 7 + Math.random()*5,
            len: (type==='storm' ? 14 : 10) + Math.random()*6
        }));
        wxCanvases.push({ canvas, particles, type });

        if (type === 'storm') {
            const flash = document.createElement('div');
            flash.className = 'wx-lightning';
            card.appendChild(flash);
            (function strike() {
                setTimeout(() => {
                    flash.classList.remove('on');
                    void flash.offsetWidth;
                    flash.classList.add('on');
                    if (card.isConnected) strike();
                }, 3500 + Math.random()*8000);
            })();
        }

    } else if (type === 'snow') {
        const canvas = document.createElement('canvas');
        canvas.className = 'wx-canvas';
        card.appendChild(canvas);
        const particles = Array.from({length:38}, () => ({
            x: Math.random()*400, y: Math.random()*300,
            r: 1.5 + Math.random()*2,
            speed: 0.7 + Math.random()*1.1,
            drift: Math.random()*Math.PI*2,
            dSpeed: 0.01 + Math.random()*.02
        }));
        wxCanvases.push({ canvas, particles, type:'snow' });
    }
}

function tickWx() {
    wxCanvases.forEach(({ canvas, particles, type }) => {
        if (!canvas.isConnected) return;
        const card = canvas.parentElement;
        const w = card.clientWidth, h = card.clientHeight;
        if (!w || !h) return;
        if (canvas.width !== w) canvas.width = w;
        if (canvas.height !== h) canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, w, h);

        if (type === 'rain' || type === 'storm') {
            ctx.strokeStyle = `rgba(180,210,255,${type==='storm'?.78:.55})`;
            ctx.lineWidth = type === 'storm' ? 1.5 : 1;
            particles.forEach(p => {
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x - p.len*.18, p.y + p.len);
                ctx.stroke();
                p.x -= p.len*.13; p.y += p.speed;
                if (p.y > h+15) { p.y=-10; p.x=Math.random()*w; }
                if (p.x < -10)  { p.x=w;   p.y=Math.random()*h; }
            });
        }

        if (type === 'snow') {
            ctx.fillStyle = 'rgba(255,255,255,.85)';
            particles.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
                ctx.fill();
                p.drift += p.dSpeed;
                p.x += Math.sin(p.drift)*.55;
                p.y += p.speed;
                if (p.y > h+5) { p.y=-5; p.x=Math.random()*w; }
            });
        }
    });
    wxRAF = requestAnimationFrame(tickWx);
}

// RENDER
function render(){
    stopWx();
    const container=document.getElementById('posts');
    container.innerHTML="";
    const search=document.getElementById('search').value.toLowerCase();

    posts.filter(p=>p.title.toLowerCase().includes(search))
    .forEach(post=>{
        if (!post.wx) post.wx = WX_TYPES[Math.floor(Math.random()*WX_TYPES.length)];
        const el=document.createElement('div');
        el.className='card';
        el.style.backgroundImage=`url('${post.image}')`;
        el.innerHTML=`
        <div class="card-content">
        <h4>${post.title}</h4>
        <p>${post.date}</p>
        </div>
        `;
        container.appendChild(el);
        initWx(el, post.wx);
    });

    if (wxCanvases.length) tickWx();
}

// RENDER NEXT ADVENTURES
function renderNextAdventures(){
    const container=document.getElementById('next-adventures-grid');
    container.innerHTML="";
    nextAdventures.forEach(adv=>{
        if (!adv.wx) adv.wx = WX_TYPES[Math.floor(Math.random()*WX_TYPES.length)];
        const el=document.createElement('div');
        el.className='card';
        el.style.backgroundImage=`url('${adv.image}')`;
        el.innerHTML=`
        <div class="card-content">
        <h4>${adv.title}</h4>
        ${adv.estDate ? `<p>${adv.estDate}</p>` : ''}
        ${adv.estTime ? `<p>${adv.estTime}</p>` : ''}
        </div>
        `;
        container.appendChild(el);
        initWx(el, adv.wx);
    });
}

posts = postsData;
renderNextAdventures();
render();

// SEARCH
document.getElementById('search').addEventListener('input',render);

// THEME TOGGLE
const themeBtn = document.getElementById('theme-toggle');
if (localStorage.getItem('theme') === 'light') {
    document.body.classList.add('light');
    themeBtn.textContent = '☀️';
}
themeBtn.addEventListener('click', () => {
    document.body.classList.toggle('light');
    const isLight = document.body.classList.contains('light');
    themeBtn.textContent = isLight ? '☀️' : '🌙';
    localStorage.setItem('theme', isLight ? 'light' : 'dark');
});
</script>

</body>
</html>
