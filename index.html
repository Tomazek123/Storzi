<!DOCTYPE html>

<html lang="sl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storži - Outdoor skupnost</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background: #0f172a;
    color: #e5e7eb;
    overflow-x: hidden;
}

/* BACKGROUND */
.bg {
    position: fixed;
    inset: 0;
    background: url("logo.jpg") center/cover no-repeat;
    transform: scale(1.1);
    z-index: -2;
}
.bg::after {
    content:"";
    position:absolute;
    inset:0;
    background: rgba(15,23,42,0.85);
}

/* WATERMARK */
.watermark {
    position: fixed;
    inset: 0;
    background: url("logo.jpg.jpg") no-repeat center;
    background-size: 500px;
    opacity: 0.05;
    pointer-events: none;
    z-index: -1;
}

/* NAV */
nav {
    position: fixed;
    top: 0;
    width: 100%;
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
    background: rgba(15,23,42,0.7);
    backdrop-filter: blur(10px);
    z-index: 10;
}

/* BUTTON */
button {
    background: #22c55e;
    border: none;
    padding: 10px 20px;
    border-radius: 999px;
    cursor: pointer;
}

/* HERO */
.hero {
    height: 100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
}

/* SECTION */
.section {
    padding: 100px 20px;
    max-width: 1200px;
    margin:auto;
}

/* STATS */
.stats {
    display:flex;
    justify-content:space-around;
    margin-bottom:40px;
}

/* SEARCH */
.search {
    margin-bottom:40px;
    text-align:center;
}
.search input {
    padding:10px;
    width:300px;
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:30px;
}

/* CARD */
.card {
    height:300px;
    border-radius:20px;
    background-size:cover;
    background-position:center;
    position:relative;
    transform-style:preserve-3d;
    transition: transform 0.1s;
}

.card::after {
    content:"";
    position:absolute;
    inset:0;
    background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
}

.card-content {
    position:absolute;
    bottom:20px;
    left:20px;
    z-index:2;
    transform: translateZ(40px);
}

/* GLOW */
.card:hover {
    box-shadow: 0 0 40px rgba(34,197,94,0.4);
}

/* MODAL */
.modal {
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.7);
    display:none;
    align-items:center;
    justify-content:center;
}
.modal-content {
    background:#111827;
    padding:30px;
    border-radius:15px;
}
.modal input {
    display:block;
    margin-bottom:10px;
    padding:10px;
}
</style>

</head>

<body>

<div class="bg" id="bg"></div>
<div class="watermark" id="wm"></div>

<nav>
    <h1>🌲 Storži</h1>
    <button onclick="openModal()">Dodaj izlet</button>
</nav>

<section class="hero">
    <h2>Razišči Slovenijo</h2>
</section>

<section class="section">

<div class="stats">
    <div>🏔 12 vrhov</div>
    <div>🥾 340 km</div>
    <div>📅 8 izletov</div>
</div>

<div class="search">
    <input id="search" placeholder="Išči izlet...">
</div>

<div class="grid" id="posts"></div>

</section>

<!-- MODAL -->

<div class="modal" id="modal">
<div class="modal-content">
<h3>Nov izlet</h3>
<input id="title" placeholder="Naslov">
<input id="date" placeholder="Datum">
<input id="image" placeholder="Slika">
<input id="link" placeholder="Link">
<button onclick="addPost()">Shrani</button>
</div>
</div>

<script>
// PARALLAX BG
document.addEventListener('mousemove', e=>{
    const x=(e.clientX/window.innerWidth-0.5)*20;
    const y=(e.clientY/window.innerHeight-0.5)*20;
    bg.style.transform=`scale(1.1) translate(${x}px,${y}px)`;
    wm.style.transform=`translate(${x/2}px,${y/2}px)`;
});

// POSTS
let posts=[];

fetch('data.json')
.then(res=>res.json())
.then(data=>{
    const saved=JSON.parse(localStorage.getItem('posts'))||[];
    posts=[...data.posts,...saved];
    render();
});

function render(){
    const container=document.getElementById('posts');
    container.innerHTML="";

    const search=document.getElementById('search').value.toLowerCase();

    posts.filter(p=>p.title.toLowerCase().includes(search))
    .forEach(post=>{
        const el=document.createElement('div');
        el.className='card';
        el.style.backgroundImage=`url('${post.image}')`;

        el.innerHTML=`
        <div class="card-content">
        <h4>${post.title}</h4>
        <p>${post.date}</p>
        </div>
        `;

        container.appendChild(el);
    });
}

// SEARCH
document.getElementById('search').addEventListener('input',render);

// 3D TILT
document.addEventListener('mousemove', e=>{
document.querySelectorAll('.card').forEach(card=>{
    const rect=card.getBoundingClientRect();
    const x=e.clientX-rect.left;
    const y=e.clientY-rect.top;

    const rx=-(y/rect.height-0.5)*20;
    const ry=(x/rect.width-0.5)*20;

    card.style.transform=`rotateX(${rx}deg) rotateY(${ry}deg)`;
});
});

// RESET
document.addEventListener('mouseleave',()=>{
document.querySelectorAll('.card').forEach(c=>{
    c.style.transform='rotateX(0) rotateY(0)';
});
});

// ADMIN
function openModal(){
document.getElementById('modal').style.display='flex';
}

function addPost(){
const post={
title:title.value,
date:date.value,
image:image.value,
link:link.value
};

posts.push(post);

const saved=JSON.parse(localStorage.getItem('posts'))||[];
saved.push(post);
localStorage.setItem('posts',JSON.stringify(saved));

modal.style.display='none';
render();
}
</script>

</body>
</html>
